<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration & Photo Upload</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .form-container {
            width: 100%;
            max-width: 450px;
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }
        h2 {
            font-size: 24px;
            color: #1e293b;
            margin-bottom: 24px;
            font-weight: 700;
            text-align: left;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #475569;
        }
        .form-group input[type="text"],
        .form-group input[type="email"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background-color: #fff;
            color: #1e293b;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input[type="text"]:focus,
        .form-group input[type="email"]:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .form-group input[type="file"] {
            width: 100%;
            padding: 10px;
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.2s;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            margin-top: 10px;
        }
        .btn:hover {
            background-color: #1d4ed8;
        }
        .btn:disabled {
            background-color: #93c5fd;
            cursor: not-allowed;
            box-shadow: none;
        }
        #statusMessage {
            margin-top: 16px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Student Registration Form</h2>
    
    <form id="studentForm" action="https://formspree.io/f/mdarnlkl" method="POST">
        
        <div class="form-group">
            <label for="name">Student Name</label>
            <input type="text" id="name" name="Name" required placeholder="Enter student's full name">
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="Email" required placeholder="Enter email address">
        </div>

        <div class="form-group">
            <label for="imageInput">Upload Photo (HD Quality)</label>
            <input type="file" id="imageInput" accept="image/*" required>
        </div>

        <input type="hidden" id="imageUrl" name="Student_Photo_Link">

        <button type="submit" id="submitBtn" class="btn">Submit Form</button>
    </form>

    <div id="statusMessage"></div>
</div>

<script>
    // --- Cloudinary Config ---
    const CLOUD_NAME = 'durfckxxo'; 
    const UPLOAD_PRESET = 'ml_default'; 

    const imageInput = document.getElementById('imageInput');
    const imageUrlInput = document.getElementById('imageUrl');
    const studentForm = document.getElementById('studentForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusMessage = document.getElementById('statusMessage');

    imageInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Disable UI interactions during upload
        submitBtn.disabled = true;
        statusMessage.style.color = '#2563eb';
        statusMessage.innerText = 'Uploading photo to secure server, please wait...';

        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);

        try {
            const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const data = await response.json();
                imageUrlInput.value = data.secure_url; // HD URL caught
                
                statusMessage.style.color = '#16a34a';
                statusMessage.innerText = '✓ Photo uploaded successfully! Ready to submit.';
                submitBtn.disabled = false;
            } else {
                const errorData = await response.json();
                throw new Error(errorData.error.message || 'Upload failed');
            }
        } catch (error) {
            console.error('Cloudinary Error:', error);
            statusMessage.style.color = '#dc2626';
            statusMessage.innerText = 'Error: ' + error.message + '. Please ensure "ml_default" is Unsigned and Saved.';
            submitBtn.disabled = true;
            alert('Upload Failed: ' + error.message + '\n\nTip: Make sure you clicked "Save" after changing the preset to Unsigned in Cloudinary settings.');
        }
    });

    studentForm.addEventListener('submit', async (e) => {
        if (!imageUrlInput.value) {
            e.preventDefault();
            alert('Please wait for the photo to upload fully before submitting.');
        }
    });
</script>

</body>
</html>
