<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration & Photo Upload</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
        }
        .form-container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input[type="text"],
        .form-group input[type="email"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        .btn:disabled {
            background-color: #a0c4ff;
            cursor: not-allowed;
        }
        #statusMessage {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Student Registration Form</h2>
    
    <form id="studentForm" action="https://formspree.io/f/mdarnlkl" method="POST">
        
        <div class="form-group">
            <label for="name">Student Name:</label>
            <input type="text" id="name" name="Name" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="Email" required>
        </div>

        <div class="form-group">
            <label for="imageInput">Upload Photo (HD Quality):</label>
            <input type="file" id="imageInput" accept="image/*" required>
        </div>

        <input type="hidden" id="imageUrl" name="Student_Photo_Link">

        <button type="submit" id="submitBtn" class="btn">Submit Form</button>
    </form>

    <div id="statusMessage"></div>
</div>

<script>
    // --- Cloudinary Credentials (Configured with your details) ---
    const CLOUD_NAME = 'durfckxxo'; 
    const UPLOAD_PRESET = 'ml_default'; 

    const imageInput = document.getElementById('imageInput');
    const imageUrlInput = document.getElementById('imageUrl');
    const studentForm = document.getElementById('studentForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusMessage = document.getElementById('statusMessage');

    // Trigger upload as soon as the student selects a file
    imageInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Disable submit button during upload
        submitBtn.disabled = true;
        statusMessage.style.color = '#007bff';
        statusMessage.innerText = 'Uploading photo, please wait...';

        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);

        try {
            // Uploading image directly to Cloudinary API
            const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const data = await response.json();
                // Set the HD image URL in the hidden input field
                imageUrlInput.value = data.secure_url;
                
                statusMessage.style.color = 'green';
                statusMessage.innerText = 'Photo uploaded successfully! You can now submit the form.';
                submitBtn.disabled = false;
            } else {
                throw new Error('Upload failed');
            }
        } catch (error) {
            console.error('Error uploading image:', error);
            statusMessage.style.color = 'red';
            statusMessage.innerText = 'Failed to upload photo. Please ensure "ml_default" preset is set to Unsigned.';
            submitBtn.disabled = true;
        }
    });

    // Form submission validation
    studentForm.addEventListener('submit', async (e) => {
        if (!imageUrlInput.value) {
            e.preventDefault();
            alert('Please wait for the photo to upload completely before submitting.');
        }
    });
</script>

</body>
</html>
